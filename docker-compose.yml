services:
  claude-playground:
    build: .
    image: claude-code-playground
    container_name: claude-playground
    stdin_open: true   # docker run -i
    tty: true          # docker run -t
    environment:
      # Only needed if using Console/API access instead of a Claude subscription.
      # Leave unset to log in interactively via browser (Pro/Max/Team/Enterprise).
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      # Your local workspace — files persist on your host machine between sessions.
      - ./workspace:/workspace

      # Mount host Claude credentials so you stay logged in across container rebuilds.
      # Set CLAUDE_HOME in your .env file to your home directory path.
      # Windows example: CLAUDE_HOME=/c/Users/YourUsername
      # macOS/Linux example: CLAUDE_HOME=/home/yourusername  (or CLAUDE_HOME=~)
      - ${CLAUDE_HOME}/.claude:/home/claude/.claude
      - ${CLAUDE_HOME}/.claude.json:/home/claude/.claude.json

    working_dir: /workspace
